<!DOCTYPE html>
<html>
<head>
    <title>Fetch JSON Data</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Student Data</h2>

        <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="searchStudent()">

        <button onclick="loadData()">Load Students</button>

        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Course</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
