<!DOCTYPE html>
<html>
<head>
    <title>Character Limit Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Character Limit Checker</h2>

        <textarea 
            id="textArea" 
            rows="6" 
            maxlength="200"
            placeholder="Type something (max 200 characters)..."
            oninput="checkLimit()">
        </textarea>

        <p>Remaining Characters: <span id="remaining">200</span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
