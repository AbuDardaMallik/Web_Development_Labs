<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Show / Hide Paragraph</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="box">
        <h2>Toggle Paragraph</h2>

        <button onclick="togglePara()">Show / Hide</button>

        <p id="para">
            This is a sample paragraph. Click the button to show or hide me.
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
